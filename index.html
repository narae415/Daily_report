<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Daily Report Maker</title>
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <div class="lnb">
        <div class="lnb-header">
            <span>🕒 히스토리</span>
            <div style="display:flex; align-items:center; gap:5px;">
                <input type="checkbox" id="master_checkbox" onclick="toggleSelectAll(this)">
                <label for="master_checkbox" style="font-size:10px; cursor:pointer;">전체</label>
            </div>
        </div>
        <div class="lnb-list" id="history_list"></div>
        <div class="lnb-actions">
            <button class="btn btn-primary" style="flex: 1;" onclick="mergeHistory()">선택 취합하기</button>
            <button class="btn btn-clear" style="width: 35px; font-size: 14px;" onclick="deleteHistory()">🗑️</button>
        </div>
    </div>

    <div class="main-content">
        <div class="top-nav">
            <div class="tab-header">
                <button class="tab-btn active" onclick="switchTab(1)">공백 변환기</button>
                <button class="tab-btn" onclick="switchTab(2)">일보고 작성</button>
                <button class="tab-btn" onclick="switchTab(3)">지라 집계</button>
            </div>
            <div class="nav-actions">
                <button class="btn btn-primary" onclick="openWiki()">🔗일보고 바로가기</button>
                <button class="btn btn-copy" style="width: 22px; height: 22px; border-radius: 50%; padding:0; color: #888;" onclick="openHelp()">?</button>
            </div>
        </div>

        <div id="tab1" class="tab-content active">
            <div class="converter-layout">
                <div class="pane">
                    <div class="pane-header">
                        <span class="pane-title">✏️작성창</span>
                        <div class="header-buttons">
                            <button class="btn btn-action btn-clear" onclick="clearText('input_box')">Clear</button>
                            <button class="btn btn-action btn-copy" onclick="copyText('input_box')">복사</button>
                        </div>
                    </div>
                    <textarea id="input_box" placeholder="내용을 입력하세요."></textarea>
                    <div id="input_count" class="char-count">글자 수: 0자</div>
                </div>
                <div class="mid-buttons">
                    <button class="btn btn-primary" style="width: 80px; height: 35px;" onclick="processText()">변환</button>
                </div>
                <div class="pane">
                    <div class="pane-header">
                        <span class="pane-title">📃변환결과</span>
                        <div class="header-buttons">
                            <button class="btn btn-action btn-clear" onclick="clearText('output_box')">Clear</button>
                            <button class="btn btn-action btn-copy" onclick="copyText('output_box')">복사</button>
                        </div>
                    </div>
                    <textarea id="output_box" readonly style="background: #FAFAFA;"></textarea>
                    <div id="output_count" class="char-count">전체 글자 수: 0자</div>
                </div>
            </div>
        </div>

        <div id="tab2" class="tab-content">
            <div class="config-bar">
                <strong>이름:</strong>
                <input type="text" id="cfg_name" style="width: 90px;">
                <strong>서비스명:</strong>
                <input type="text" id="cfg_services" style="width: 320px;" placeholder="ex)회원가입, 로그인, 결제">
                <button class="btn btn-action btn-copy" onclick="applyFixedFormat()">적용/저장</button>
            </div>
            <div class="action-bar">
                <div class="action-left">
                    <button class="btn btn-copy" onclick="copyProgress()">복사(이름, 100%, 날짜)</button>
                    <button class="btn btn-action btn-copy" onclick="copyText('smart_input')">복사</button>
                </div>
                <button class="btn btn-action btn-clear" onclick="clearText('smart_input')">Clear</button>
            </div>
            <textarea id="smart_input"></textarea>
        </div>

        <div id="tab3" class="tab-content">
            <div class="pane-header">
                <div style="display:flex; align-items:center; gap:8px;">
                    <span class="pane-title" style="color: #0288D1;">📥 지라 결과 붙여넣기</span>
                    <button class="btn btn-copy" style="width: 18px; height: 18px; border-radius: 50%; padding:0; font-size:10px; color:#888;" onclick="openJiraHelp()">?</button>
                </div>
                <div class="header-buttons">
                    <button class="btn btn-primary" style="padding: 6px 15px;" onclick="saveJiraToHistory()">내용 적용</button>
                    <button class="btn btn-action btn-clear" onclick="clearText('jira_input_box')">Clear</button>
                </div>
            </div>
            <textarea id="jira_input_box" placeholder="지라 사이트에서 추출한 내용을 여기에 Ctrl+V 하세요."></textarea>
            <div id="jira_input_count" class="char-count">글자 수: 0자</div>
        </div>
    </div>
</div>

<div id="help_modal" class="modal-overlay" onclick="if(event.target===this) closeHelp()">...</div>
<div id="jira_help_modal" class="modal-overlay" onclick="if(event.target===this) closeJiraHelp()">...</div>

<div id="toast">알림 메시지</div>
<script src="script.js"></script>
</body>
</html>
